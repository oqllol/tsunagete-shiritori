<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- GA: 測定ID取得後にここへ noga除外＋gtag スニペットを挿入する -->
<title>つなげて しりとり ｜ とびら工作室</title>
<meta name="description" content="まえの ことばの さいごの おとで はじまる ものを えらんで、しりとりを つなげよう。3〜5さいの ための、しりとり にゅうもん。">
<meta name="theme-color" content="#cdeafb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff6e2; --sky:#cdeafb; --card:#fff; --ink:#4a3b28; --ink-soft:#93836c;
    --coral:#ff6b6b; --coral-d:#e84f4f; --yellow:#ffd93d; --yellow-d:#f5a623;
    --blue:#4dabf7; --green:#51c96f; --grape:#b07be0;
    --maru:"Zen Maru Gothic", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    margin:0; font-family:var(--maru); color:var(--ink);
    background:linear-gradient(180deg, var(--sky) 0%, #ffeede 40%, var(--cream) 100%);
    background-attachment:fixed; overflow:hidden;
    -webkit-font-smoothing:antialiased; user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
  }
  /* ふわふわ雲（シリーズ共通の世界観） */
  .sky-deco{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .cloud{ position:absolute; background:#fff; border-radius:50%; opacity:.7;
    box-shadow:40px 8px 0 -4px #fff, 78px 0 0 -8px #fff, -34px 6px 0 -6px #fff; }
  .c1{ width:60px; height:60px; top:7%;  left:-15%; animation:drift 50s linear infinite; }
  .c2{ width:44px; height:44px; top:20%; left:-15%; animation:drift 70s linear infinite; animation-delay:-25s; opacity:.55; }
  @keyframes drift{ to{ transform:translateX(135vw); } }

  .app{ position:relative; z-index:1; height:100dvh; display:flex; flex-direction:column;
    max-width:680px; margin:0 auto; padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom); }

  /* ============ じょうぶ バー ============ */
  .topbar{ display:flex; align-items:center; gap:10px; padding:12px 4px 6px; }
  .home{ font-family:var(--maru); font-weight:900; font-size:14px; color:var(--ink);
    background:#fff; border:none; border-radius:100px; padding:8px 15px; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.08); }
  .home:active{ transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.08); }
  .progress{ flex:1; height:16px; background:#fff; border-radius:100px; overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.08); }
  .progress > i{ display:block; height:100%; width:0%; border-radius:100px;
    background:linear-gradient(90deg,var(--yellow),var(--yellow-d)); transition:width .5s cubic-bezier(.34,1.56,.5,1); }
  .stars{ font-family:var(--maru); font-weight:900; font-size:15px; color:var(--yellow-d);
    background:#fff; border-radius:100px; padding:6px 13px; box-shadow:0 4px 0 rgba(0,0,0,.06); white-space:nowrap; }

  /* ============ いまの ことば ============ */
  .nowbox{ text-align:center; padding:16px 0 4px; }
  .nowbox .lead{ font-weight:700; font-size:13px; color:var(--ink-soft); margin:0 0 8px; }
  .cur-word{ display:inline-flex; align-items:center; gap:10px;
    background:#fff; border-radius:24px; padding:10px 22px;
    box-shadow:0 6px 0 rgba(0,0,0,.08), 0 12px 20px -10px rgba(0,0,0,.3); }
  .cur-word .emoji{ font-size:clamp(40px,12vw,64px); line-height:1; }
  .cur-word .text{ font-weight:900; font-size:clamp(26px,8vw,40px); letter-spacing:1px; }
  .cur-word .text .hi{ color:var(--coral); position:relative;
    font-size:1.25em; text-shadow:0 2px 0 #ffe0e0; }
  .tail-say{ margin:0 0 16px; font-weight:900; font-size:clamp(16px,5vw,22px); color:var(--coral); }
  .tail-say .k{ display:inline-block; background:var(--coral); color:#fff; border-radius:12px;
    padding:2px 12px; margin:0 2px; box-shadow:0 3px 0 var(--coral-d); }

  /* ============ つぎは どれ？（候補） ============ */
  .pick-lead{ text-align:center; font-weight:900; font-size:clamp(18px,5.5vw,24px);
    color:var(--ink); margin:14px 0 8px; text-shadow:2px 2px 0 #fff; }
  .stage{ flex:1; min-height:0; display:flex; flex-direction:column; justify-content:flex-start; padding-top:clamp(28px,6vh,56px); }
  .pick-group{ display:flex; flex-direction:column; align-items:center; }
  .choices{ display:flex; justify-content:center; gap:clamp(12px,3.5vw,22px); flex-wrap:wrap; padding:0; }
  .choice{ position:relative; font-family:var(--maru); cursor:pointer; border:none;
    background:#fff; border-radius:22px; padding:14px 10px 12px; width:clamp(96px,28vw,140px);
    display:flex; flex-direction:column; align-items:center; gap:4px;
    box-shadow:0 7px 0 #d9c7a8, 0 12px 18px -8px rgba(0,0,0,.35); transition:transform .12s; }
  .choice:active{ transform:translateY(4px); box-shadow:0 3px 0 #d9c7a8; }
  .choice .emoji{ font-size:clamp(40px,12vw,60px); line-height:1; }
  .choice .text{ font-weight:900; font-size:clamp(17px,5vw,22px); color:var(--ink); }
  .choice .text .hi{ color:var(--blue); font-size:1.18em; }
  .choice.wrong{ animation:shake .45s; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px);} 60%{transform:translateX(9px);} }
  .choice.gone{ opacity:0; transform:scale(.6); pointer-events:none; transition:.3s; }

  /* じさ ひょうじ: といかけ＋こうほは ワンテンポ おいて あらわす */
  .reveal-group{ opacity:0; transform:translateY(10px);
    transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.4,.5,1); }
  .reveal-group.on{ opacity:1; transform:none; }
  /* いまの ことばは でるたびに ぽんと */
  .cur-word.enter{ animation:cwpop .4s cubic-bezier(.34,1.7,.5,1); }
  @keyframes cwpop{ 0%{ transform:scale(.82); opacity:.35; } 100%{ transform:scale(1); opacity:1; } }

  /* ============ したの くさり ============ */
  .chain-wrap{ padding:8px 0 4px; overflow-x:auto; }
  .chain{ display:flex; align-items:center; gap:2px; justify-content:center; min-height:46px; flex-wrap:nowrap; }
  .chain .link{ font-size:clamp(26px,8vw,40px); line-height:1; animation:pop .4s cubic-bezier(.34,1.7,.5,1) both; }
  .chain .join{ color:var(--ink-soft); font-size:18px; }
  @keyframes pop{ 0%{transform:scale(0) rotate(-12deg);} 60%{transform:scale(1.2) rotate(6deg);} 100%{transform:scale(1) rotate(0);} }

  /* ============ フィードバック ============ */
  .flash{ position:fixed; inset:0; z-index:20; display:none; align-items:center; justify-content:center; pointer-events:none; }
  .flash.show{ display:flex; }
  .flash .word{ font-family:var(--maru); font-weight:900; font-size:clamp(44px,15vw,90px);
    color:var(--green); text-shadow:3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,.08);
    animation:popf .6s cubic-bezier(.34,1.7,.5,1); }
  @keyframes popf{ 0%{transform:scale(0) rotate(-12deg);} 60%{transform:scale(1.15) rotate(4deg);} 100%{transform:scale(1) rotate(0);} }

  /* ============ かいし／ごほうび 画面 ============ */
  .screen{ position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:30px;
    background:linear-gradient(180deg, var(--sky) 0%, #ffeede 45%, var(--cream) 100%); }
  .screen.hide{ display:none; }
  .screen .big{ font-family:var(--maru); font-weight:900; font-size:clamp(32px,8.5vw,52px); margin:0;
    color:var(--coral); text-shadow:2px 2px 0 #fff; }
  .screen .sub{ font-weight:700; color:var(--ink-soft); font-size:15px; margin:14px 0 0; max-width:24em; }
  .bigmark{ font-size:clamp(80px,26vw,140px); line-height:1; animation:bob 2.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(-4deg);} 50%{transform:translateY(-12px) rotate(4deg);} }
  .start-btn{ margin-top:26px; font-family:var(--maru); font-weight:900; font-size:24px; color:#fff;
    background:var(--coral); border:none; border-radius:100px; padding:18px 46px; cursor:pointer;
    box-shadow:0 8px 0 var(--coral-d), 0 16px 24px -10px rgba(0,0,0,.4); }
  .start-btn:active{ transform:translateY(4px); box-shadow:0 4px 0 var(--coral-d); }
  .stickers{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; max-width:340px; margin:22px auto 0; }
  .stickers span{ font-size:34px; animation:pop .5s cubic-bezier(.34,1.7,.5,1) both; }
  .toggle-row{ margin-top:20px; display:flex; gap:8px; }
  .toggle-row button{ font-family:var(--maru); font-weight:700; font-size:13px; color:var(--ink);
    background:#fff; border:none; border-radius:100px; padding:9px 16px; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.06); }
  .toggle-row button[aria-pressed="false"]{ opacity:.5; }

  /* ============ レベルえらび ============ */
  .levels{ display:flex; gap:clamp(10px,3vw,16px); flex-wrap:wrap; justify-content:center; margin-top:24px; }
  .level-btn{ position:relative; font-family:var(--maru); font-weight:900; color:#fff;
    width:clamp(90px,26vw,116px); border:none; border-radius:24px; cursor:pointer; padding:14px 8px 12px;
    display:flex; flex-direction:column; align-items:center; gap:2px; transition:transform .12s; }
  .level-btn:active{ transform:translateY(4px); }
  .level-btn .lv-emoji{ font-size:clamp(34px,10vw,46px); line-height:1; }
  .level-btn .lv-name{ font-size:15px; }
  .level-btn .lv-range{ font-size:12px; font-weight:700; opacity:.92; }
  .level-btn .lv-clear{ position:absolute; top:-12px; right:-8px; font-size:26px;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); }
  .reward-btns{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:24px; }
  .reward-btns .start-btn{ margin-top:0; font-size:20px; padding:15px 30px; }
  .reward-btns .alt-btn{ background:#fff; color:var(--coral); box-shadow:0 6px 0 rgba(0,0,0,.1); }
  .reward-btns .alt-btn:active{ box-shadow:0 3px 0 rgba(0,0,0,.1); }

  /* こんふぇってぃ */
  .confetti{ position:fixed; top:-10px; width:12px; height:16px; z-index:25; pointer-events:none; border-radius:2px; }
  @keyframes fall{ to{ transform:translateY(108vh) rotate(540deg); opacity:.2; } }

  @media (prefers-reduced-motion: reduce){
    .cloud,.bigmark,.flash .word,.chain .link{ animation:none !important; }
  }
</style>
</head>
<body>
<div class="sky-deco"><div class="cloud c1"></div><div class="cloud c2"></div></div>

<!-- ================= かいし がめん ================= -->
<div class="screen" id="startScreen">
  <div class="bigmark">🔗</div>
  <h1 class="big">つなげて しりとり</h1>
  <p class="sub">まえの ことばの さいごの おとで はじまる ものを えらんで、しりとりを つなげよう！レベルを えらんでね。</p>
  <div class="levels" id="levelButtons"></div>
  <div class="toggle-row">
    <button id="soundToggle" aria-pressed="true">🔊 おと あり</button>
  </div>
</div>

<!-- ================= ごほうび がめん ================= -->
<div class="screen hide" id="rewardScreen">
  <div class="bigmark" id="rewardMark">🏆</div>
  <h1 class="big">やったね！</h1>
  <p class="sub" id="rewardSub">クリア！シールを ゲット！</p>
  <div class="stickers" id="stickers"></div>
  <div class="reward-btns" id="rewardBtns"></div>
</div>

<!-- ================= ゲーム ほんたい ================= -->
<div class="app" id="game" style="display:none">
  <div class="topbar">
    <button class="home" id="homeBtn">🏠</button>
    <div class="progress"><i id="bar"></i></div>
    <div class="stars" id="score">⭐ 0</div>
  </div>

  <div class="nowbox">
    <p class="lead">いまの ことば</p>
    <div class="cur-word" id="curWord"></div>
  </div>

  <div class="stage">
    <div class="pick-group">
      <p class="tail-say reveal-group" id="tailSay"></p>
      <div class="choices reveal-group" id="choices"></div>
    </div>
  </div>

  <div class="chain-wrap"><div class="chain" id="chain"></div></div>
</div>

<div class="flash" id="flash"><div class="word" id="flashWord">つながった！</div></div>

<script>
/* ============================================================
   つなげて しりとり  —  3〜5さい / しりとり にゅうもん
   「まえの ことばの さいごの おと ＝ つぎの ことばの さいしょの おと」
   を、えと おとと "つながる えんしゅつ" で おぼえる。
   ============================================================ */

/* ことばプール（えもじで えがける・「ん」おわりなし・すなおに つながる 34ご）*/
const WORDS = [
  {e:"🍉",w:"すいか"},  {e:"🦀",w:"かに"},    {e:"🐔",w:"にわとり"},{e:"🍎",w:"りんご"},
  {e:"🦍",w:"ごりら"},  {e:"🐪",w:"らくだ"},  {e:"🍡",w:"だんご"},  {e:"🐨",w:"こあら"},
  {e:"🐱",w:"ねこ"},    {e:"👓",w:"めがね"},  {e:"🐦",w:"すずめ"},  {e:"🫘",w:"まめ"},
  {e:"🐻",w:"くま"},    {e:"🥁",w:"たいこ"},  {e:"🐙",w:"たこ"},    {e:"🐷",w:"こぶた"},
  {e:"🍓",w:"いちご"},  {e:"🪑",w:"いす"},    {e:"🐮",w:"うし"},    {e:"🦌",w:"しか"},
  {e:"🐦‍⬛",w:"からす"}, {e:"🍆",w:"なす"},    {e:"🍣",w:"すし"},    {e:"☂️",w:"かさ"},
  {e:"🐟",w:"さかな"},  {e:"🍌",w:"ばなな"},  {e:"🍐",w:"なし"},    {e:"🚢",w:"ふね"},
  {e:"⭐",w:"ほし"},    {e:"🌸",w:"はな"},    {e:"🐢",w:"かめ"},    {e:"👟",w:"くつ"},
  {e:"🌙",w:"つき"},    {e:"🍄",w:"きのこ"}
];

const STICKERS = ["🌟","🌈","🍓","🦄","🎈","🌸","🐞","🍭","⭐","🎀","🐠","🍀"];

/* レベル: つなぐ かずと、えらぶ かずが ふえる */
const LEVELS = [
  { id:1, name:"やさしい",   links:3, choices:2, emoji:"🐣", bg:"var(--green)", shadow:"#38a754" },
  { id:2, name:"ふつう",     links:4, choices:3, emoji:"🐰", bg:"var(--blue)",  shadow:"#2f8fd6" },
  { id:3, name:"むずかしい", links:5, choices:3, emoji:"🦊", bg:"var(--coral)", shadow:"var(--coral-d)" }
];

const state = {
  level: LEVELS[0],
  chain: [],       // かくてい した くさり（WORDの はいれつ）
  step: 0,         // いま なんばんめを つなぐか（1..links-1）
  lockBoard: false,
  sound: true,
  earned: []
};

const $ = id => document.getElementById(id);

/* おとの きりだし */
const lastKana  = w => w.slice(-1);
const firstKana = w => w[0];

/* クリアした レベルを 端末に おぼえておく（⭐ ひょうじ よう）*/
function getCleared(){ try{ return JSON.parse(localStorage.getItem("st-cleared")||"[]"); }catch(e){ return []; } }
function markCleared(id){ const c=getCleared(); if(!c.includes(id)){ c.push(id); try{ localStorage.setItem("st-cleared", JSON.stringify(c)); }catch(e){} } }

/* ---------- おと（WebAudio）---------- */
let actx = null;
function audio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function beep(freqs, dur=0.12, type="sine", gain=0.18){
  if(!state.sound) return;
  const a = audio(); if(!a) return;
  let t = a.currentTime;
  freqs.forEach((f,i)=>{
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = f;
    o.connect(g); g.connect(a.destination);
    const st = t + i*dur;
    g.gain.setValueAtTime(0, st);
    g.gain.linearRampToValueAtTime(gain, st+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, st+dur);
    o.start(st); o.stop(st+dur);
  });
}
const sndLink    = ()=> beep([523,784], 0.12, "triangle", 0.18);
const sndCorrect = ()=> beep([523,659,784,1047], 0.13, "triangle", 0.2);
const sndWrong   = ()=> beep([330,247], 0.16, "sine", 0.16);
const sndPop     = ()=> beep([880,1175], 0.12, "triangle", 0.18);

/* よみあげ */
function say(text){
  if(!state.sound || !("speechSynthesis" in window)) return;
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP"; u.rate = 0.95; u.pitch = 1.25;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
/* ことばを よみ → ま → 「●」→ 1テンポ → 「から はじまる のは どれ？」と うながす */
let sayToken = 0;                 // ふるい タイマーを むしする ための ふだ
let turnToken = 0;                // じさ ひょうじ ようの ふだ
let revealTimer = null;           // といかけ＋こうほを みせる タイマー
const PROMPT_DELAY = 900;         // ことばを よみおわってから「●」を いうまでの ま(ms)
const KANA_GAP    = 500;          // 「●」と「から はじまる のは どれ？」の あいだの ま(ms)
const REVEAL_DELAY = 1000;        // いまの ことばを みせてから といかけを だすまでの ま(ms)
function sayTurnPrompt(word){
  if(!state.sound || !("speechSynthesis" in window)) return;
  try{
    speechSynthesis.cancel();
    const myToken = ++sayToken;
    const kana = lastKana(word);
    const stale = ()=> (myToken !== sayToken || !state.sound);
    const u1 = new SpeechSynthesisUtterance(word);
    u1.lang="ja-JP"; u1.rate=0.95; u1.pitch=1.25;
    u1.onend = ()=>{
      if(stale()) return;                                // つぎの ターンに かわっていたら やめる
      setTimeout(()=>{
        if(stale()) return;
        const u2 = new SpeechSynthesisUtterance(kana);   // 「●」だけ
        u2.lang="ja-JP"; u2.rate=0.9; u2.pitch=1.35;
        u2.onend = ()=>{
          if(stale()) return;
          setTimeout(()=>{                               // 1テンポ おいて つづきを
            if(stale()) return;
            const u3 = new SpeechSynthesisUtterance("から はじまる のは " + (state.level.choices<=2?"どっち":"どれ") + "？");
            u3.lang="ja-JP"; u3.rate=0.95; u3.pitch=1.3;
            speechSynthesis.speak(u3);
          }, KANA_GAP);
        };
        speechSynthesis.speak(u2);
      }, PROMPT_DELAY);
    };
    speechSynthesis.speak(u1);
  }catch(e){}
}

/* ---------- くさり（しりとりの みち）を DFSで さきに つくる ---------- */
function generateChain(links){
  const order = [...WORDS].sort(()=> Math.random()-0.5); // シードを ばらす
  for(const seed of order){
    const path = [seed];
    const used = new Set([seed.w]);
    if(dfs(path, used, links)) return path;
  }
  return order.slice(0, links); // ほぼ こない フォールバック
}
function dfs(path, used, links){
  if(path.length === links) return true;
  const need = lastKana(path[path.length-1].w);
  const nexts = WORDS.filter(o => !used.has(o.w) && firstKana(o.w) === need)
                     .sort(()=> Math.random()-0.5);
  for(const nx of nexts){
    path.push(nx); used.add(nx.w);
    if(dfs(path, used, links)) return true;
    path.pop(); used.delete(nx.w);
  }
  return false;
}

/* ---------- もじを 1じずつ span に し、たいしょうの じを ハイライト ---------- */
function kanaHTML(word, idx){
  return [...word].map((ch,i)=> i===idx ? '<span class="hi">'+ch+'</span>' : ch).join("");
}

/* ---------- 1ターンを えがく ---------- */
function renderTurn(){
  const prev = state.chain[state.step-1];   // いまの ことば
  const answer = state.chain[state.step];   // せいかい（つぎ）
  const need = lastKana(prev.w);

  // いまの ことば（さいごの じを ハイライト）を さきに みせる
  const cw = $("curWord");
  cw.innerHTML =
    '<span class="emoji">'+prev.e+'</span>' +
    '<span class="text">'+kanaHTML(prev.w, prev.w.length-1)+'</span>';
  cw.classList.remove("enter"); void cw.offsetWidth; cw.classList.add("enter"); // ぽんと さいせい
  const ask = state.level.choices <= 2 ? "どっち" : "どれ";
  $("tailSay").innerHTML = '<span class="k">'+need+'</span>から はじまる のは '+ask+'？';

  // といかけ＋こうほは いったん かくす（ワンテンポ おいて だす）
  const group = [$("tailSay"), $("choices")];
  group.forEach(el=> el.classList.remove("on"));

  // こうほ（せいかい＋ダミー）。ダミーは あたまの おとが need と ちがう ものから
  const dummies = WORDS.filter(o => o.w !== answer.w && firstKana(o.w) !== need)
                       .sort(()=> Math.random()-0.5)
                       .slice(0, state.level.choices - 1);
  const opts = [answer, ...dummies].sort(()=> Math.random()-0.5);

  const box = $("choices");
  box.innerHTML = "";
  opts.forEach(o=>{
    const b = document.createElement("button");
    b.className = "choice";
    b.innerHTML =
      '<span class="emoji">'+o.e+'</span>' +
      '<span class="text">'+kanaHTML(o.w, 0)+'</span>';
    b.addEventListener("click", ()=> pickChoice(o, b, answer, need));
    box.appendChild(b);
  });

  // みせる までは えらべない → ワンテンポ おいて といかけ＋こうほを あらわす
  state.lockBoard = true;
  const myToken = ++turnToken;
  clearTimeout(revealTimer);
  revealTimer = setTimeout(()=>{
    if(myToken !== turnToken) return;
    group.forEach(el=> el.classList.add("on"));
    state.lockBoard = false;
  }, REVEAL_DELAY);

  // おんせい: ことば → ま → うながし
  setTimeout(()=> sayTurnPrompt(prev.w), 250);
}

/* ---------- えらんだ ---------- */
function pickChoice(opt, btn, answer, need){
  if(state.lockBoard) return;
  if(opt.w === answer.w){
    state.lockBoard = true;
    sndLink();
    flash(pickWord());
    confetti(12);
    // くさりに ついか
    addToChain(answer);
    state.step++;
    updateHUD();
    say(answer.w);
    setTimeout(()=>{
      if(state.step >= state.level.links){
        showReward();
      }else{
        renderTurn();
      }
    }, 1100);
  }else{
    sndWrong();
    btn.classList.add("wrong");
    setTimeout(()=> btn.classList.remove("wrong"), 450);
    $("tailSay").innerHTML = 'あれ？<span class="k">'+need+'</span>から はじまる のは '+(state.level.choices<=2?"どっち":"どれ")+'？';
    say(need + "から はじまる ものは どれかな");
  }
}

function pickWord(){
  const words = ["つながった！","せいかい！","やったー！","すごい！","ぴったり！"];
  return words[Math.floor(Math.random()*words.length)];
}

/* ---------- したの くさりを えがく ---------- */
function addToChain(word){
  const chain = $("chain");
  if(chain.children.length > 0){
    const join = document.createElement("span");
    join.className = "join"; join.textContent = "🔗";
    chain.appendChild(join);
  }
  const link = document.createElement("span");
  link.className = "link"; link.textContent = word.e;
  chain.appendChild(link);
}

/* ---------- ひょうじ こうしん ---------- */
function updateHUD(){
  const done = state.step;                 // つないだ かず
  const goal = state.level.links - 1;      // つなぐ かいすう
  $("score").textContent = "⭐ " + done;
  $("bar").style.width = (done / goal * 100) + "%";
}

function flash(word){
  $("flashWord").textContent = word;
  const f = $("flash"); f.classList.add("show");
  setTimeout(()=> f.classList.remove("show"), 1100);
}

function confetti(count=26){
  const colors = ["#ff6b6b","#ffd93d","#4dabf7","#51c96f","#b07be0"];
  for(let i=0;i<count;i++){
    const p = document.createElement("div");
    p.className = "confetti";
    p.style.left = Math.random()*100 + "vw";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animation = `fall ${0.9+Math.random()*0.8}s linear forwards`;
    p.style.animationDelay = (Math.random()*0.2)+"s";
    document.body.appendChild(p);
    setTimeout(()=> p.remove(), 2000);
  }
}

/* ---------- ごほうび ---------- */
function showReward(){
  markCleared(state.level.id);
  const sticker = STICKERS[Math.floor(Math.random()*STICKERS.length)];
  state.earned.push(sticker);
  $("rewardMark").textContent = sticker;
  $("rewardSub").textContent = "「" + state.level.name + "」の しりとり、つながった！「" + sticker + "」シールを ゲット！";
  const box = $("stickers");
  box.innerHTML = "";
  state.earned.forEach((s,i)=>{
    const sp = document.createElement("span");
    sp.textContent = s; sp.style.animationDelay = (i*0.06)+"s";
    box.appendChild(sp);
  });

  const btns = $("rewardBtns");
  btns.innerHTML = "";
  const next = LEVELS.find(l => l.id === state.level.id + 1);
  if(next){
    const nb = document.createElement("button");
    nb.className = "start-btn";
    nb.textContent = "つぎの レベル ▶";
    nb.addEventListener("click", ()=> startGame(next));
    btns.appendChild(nb);
  }
  const ab = document.createElement("button");
  ab.className = "start-btn alt-btn";
  ab.textContent = "もういちど";
  ab.addEventListener("click", ()=> startGame(state.level));
  btns.appendChild(ab);
  const cb = document.createElement("button");
  cb.className = "start-btn alt-btn";
  cb.textContent = "レベルを えらぶ";
  cb.addEventListener("click", goHome);
  btns.appendChild(cb);

  $("game").style.display = "none";
  $("rewardScreen").classList.remove("hide");
  sndCorrect();
  confetti();
  say(next ? "つながった。つぎも やってみよう" : "ぜんぶ つながった。やったね");
}

/* ---------- スタート／レベルえらび ---------- */
function startGame(level){
  state.level = level || state.level;
  audio();
  state.chain = generateChain(state.level.links);
  state.step = 1;          // 1ばんめ（シード）は すでに「いまの ことば」
  state.lockBoard = false;
  $("startScreen").classList.add("hide");
  $("rewardScreen").classList.add("hide");
  $("game").style.display = "flex";
  // くさり ひょうじを リセットし、シードを おく
  $("chain").innerHTML = "";
  addToChain(state.chain[0]);
  updateHUD();
  renderTurn();
}

function renderLevelSelect(){
  const cleared = getCleared();
  const wrap = $("levelButtons");
  wrap.innerHTML = "";
  LEVELS.forEach(lv=>{
    const b = document.createElement("button");
    b.className = "level-btn";
    b.style.background = lv.bg;
    b.style.boxShadow = "0 8px 0 " + lv.shadow + ", 0 16px 22px -12px rgba(0,0,0,.4)";
    b.innerHTML =
      (cleared.includes(lv.id) ? '<span class="lv-clear">⭐</span>' : '') +
      '<span class="lv-emoji">' + lv.emoji + '</span>' +
      '<span class="lv-name">' + lv.name + '</span>' +
      '<span class="lv-range">' + lv.links + 'こ つなぐ</span>';
    b.addEventListener("click", ()=> startGame(lv));
    wrap.appendChild(b);
  });
}

function goHome(){
  $("game").style.display = "none";
  $("rewardScreen").classList.add("hide");
  $("startScreen").classList.remove("hide");
  renderLevelSelect();
}

/* ---------- イベント ---------- */
$("homeBtn").addEventListener("click", goHome);
$("soundToggle").addEventListener("click", e=>{
  state.sound = !state.sound;
  e.currentTarget.setAttribute("aria-pressed", state.sound);
  e.currentTarget.textContent = state.sound ? "🔊 おと あり" : "🔇 おと なし";
  if(state.sound){ audio(); sndPop(); }
});
renderLevelSelect();
</script>
</body>
