<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://oqllol.github.io/tobira-kosaku/shiritori/">
<meta http-equiv="refresh" content="0; url=https://oqllol.github.io/tobira-kosaku/shiritori/">
<title>つなげて しりとり ｜ おひっこししました - とびら工作室</title>
<meta name="description" content="つなげて しりとりは とびら工作室に おひっこししました。あたらしい ばしょで あそべます。">
<script>location.replace("https://oqllol.github.io/tobira-kosaku/shiritori/" + location.search);</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{ --cream:#fff6e2; --sky:#cdeafb; --ink:#4a3b28; --ink-soft:#93836c; --coral:#ff6b6b; --coral-d:#e84f4f; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:"Zen Maru Gothic", system-ui, sans-serif; color:var(--ink);
    background:linear-gradient(180deg, var(--sky) 0%, #ffeede 38%, var(--cream) 100%); }
  .card{ background:#fff; border-radius:26px; padding:36px 30px; margin:20px; text-align:center;
    max-width:340px; box-shadow:0 7px 0 rgba(0,0,0,.07), 0 16px 26px -14px rgba(0,0,0,.35); }
  .icon{ font-size:56px; line-height:1; }
  h1{ font-weight:900; font-size:20px; line-height:1.5; margin:14px 0 6px; }
  p{ font-weight:700; font-size:14px; color:var(--ink-soft); margin:0 0 20px; line-height:1.7; }
  .go{ display:inline-block; font-weight:900; font-size:16px; color:#fff; text-decoration:none;
    background:var(--coral); border-radius:100px; padding:13px 30px; box-shadow:0 4px 0 var(--coral-d); }
  .go:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--coral-d); }
  .brand{ margin:22px 0 0; font-size:12px; }
</style>
</head>
<body>
<main class="card">
  <div class="icon">🔡</div>
  <h1>つなげて しりとりは<br>おひっこししました</h1>
  <p>あたらしい ばしょで あそべます。<br>じどうで うつらないときは したの ボタンを おしてね。</p>
  <a class="go" href="https://oqllol.github.io/tobira-kosaku/shiritori/">あそぶ ▶</a>
  <p class="brand">🚪 とびら工作室</p>
</main>
</body>
</html>
